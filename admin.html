<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>술싸 관리자</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #1D9E75;
      --primary-dark: #178a66;
      --primary-soft: #e8f7f1;
      --bg: #f0f4f2;
      --card: #fff;
      --text: #1a1f1c;
      --muted: #6b7280;
      --border: #e5ebe8;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --warning: #f59e0b;
      --warning-soft: #fffbeb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 로그인 */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-box {
      background: var(--card);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      text-align: center;
    }

    .login-box .logo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .login-box h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .login-box p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      font-family: inherit;
    }

    .login-box input:focus {
      outline: 2px solid var(--primary-soft);
      border-color: var(--primary);
    }

    .login-box button {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .login-error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* 어드민 레이아웃 */
    .admin-wrap { display: none; }

    .topbar {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h1 { font-size: 1.1rem; font-weight: 700; }

    .topbar .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
    }

    .tab-btn {
      flex-shrink: 0;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 섹션 카드 */
    .section-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .section-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-head h2 {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .section-head .count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    /* 테이블 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .data-table th {
      padding: 0.65rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }

    .data-table tr:hover td { background: #f9fafb; }

    .del-btn {
      padding: 0.3rem 0.7rem;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .del-btn:hover { background: #fee2e2; }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.18rem 0.5rem;
      border-radius: 6px;
    }

    .badge-soju { background: #e0f2fe; color: #0369a1; }
    .badge-beer { background: #fff7ed; color: #c2410c; }
    .badge-makgeolli { background: #f3e8ff; color: #7c3aed; }
    .badge-other { background: var(--bg); color: var(--muted); }

    .badge-pending { background: var(--warning-soft); color: #92400e; }
    .badge-confirmed { background: var(--primary-soft); color: var(--primary-dark); }

    /* 폼 */
    .add-form {
      padding: 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .add-form h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.85rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    .form-grid input,
    .form-grid select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--card);
    }

    .form-grid input:focus,
    .form-grid select:focus {
      outline: 2px solid var(--primary-soft);
      border-color: var(--primary);
    }

    .add-btn {
      margin-top: 0.75rem;
      padding: 0.65rem 1.25rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
    }

    .add-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 28px; height: 28px;
      margin: 2rem auto;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1rem;
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .stat-card .label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .confirm-btn {
      padding: 0.3rem 0.7rem;
      background: var(--primary-soft);
      color: var(--primary-dark);
      border: 1px solid #a7f3d0;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.35rem;
    }

    .confirm-btn:hover { background: #d1fae5; }

    .overflow-x { overflow-x: auto; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="logo">🍺</div>
    <h1>술싸 관리자</h1>
    <p>관리자 비밀번호를 입력해주세요</p>
    <input type="password" id="pw-input" placeholder="비밀번호" />
    <button onclick="doLogin()">로그인</button>
    <p class="login-error" id="login-error">비밀번호가 틀렸습니다.</p>
  </div>
</div>

<!-- 어드민 -->
<div class="admin-wrap" id="admin-wrap">
  <div class="topbar">
    <h1>🍺 술싸 관리자</h1>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="content">

    <!-- 통계 -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" id="stat-stores">-</div>
        <div class="label">등록 가게</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-deals">-</div>
        <div class="label">할인 정보</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-reports">-</div>
        <div class="label">미확인 제보</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('stores', this)">가게 관리</button>
      <button class="tab-btn" onclick="switchTab('pending', this)">⏳ 승인 대기</button>
      <button class="tab-btn" onclick="switchTab('deals', this)">할인 정보</button>
      <button class="tab-btn" onclick="switchTab('reports', this)">제보 관리</button>
      <button class="tab-btn" onclick="switchTab('add-store', this)">가게 추가</button>
    </div>

    <!-- 가게 관리 -->
    <div class="tab-panel active" id="tab-stores">
      <div class="section-card">
        <div class="section-head">
          <h2>전체 가게 목록</h2>
          <span class="count" id="stores-count">-</span>
        </div>
        <div class="overflow-x">
          <div id="stores-table"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 승인 대기 -->
    <div class="tab-panel" id="tab-pending">
      <div class="section-card">
        <div class="section-head">
          <h2>⏳ 승인 대기 (직접입력 제보)</h2>
          <span class="count" id="pending-count">-</span>
        </div>
        <div class="overflow-x">
          <div id="pending-table"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 할인 정보 -->
    <div class="tab-panel" id="tab-deals">
      <div class="section-card">
        <div class="section-head">
          <h2>할인 정보 목록</h2>
          <span class="count" id="deals-count">-</span>
        </div>
        <div class="overflow-x">
          <div id="deals-table"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 제보 관리 -->
    <div class="tab-panel" id="tab-reports">
      <div class="section-card">
        <div class="section-head">
          <h2>제보 목록</h2>
          <span class="count" id="reports-count">-</span>
        </div>
        <div class="overflow-x">
          <div id="reports-table"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 가게 추가 -->
    <div class="tab-panel" id="tab-add-store">
      <div class="section-card">
        <div class="section-head">
          <h2>가게 직접 추가</h2>
        </div>
        <div class="add-form">
          <div class="form-grid">
            <div class="full" style="position:relative">
              <input type="text" id="add-name" placeholder="가게 이름 검색 *" autocomplete="off" style="width:100%" />
              <ul id="admin-suggest" style="display:none; list-style:none; position:absolute; top:100%; left:0; right:0; margin-top:4px; border:1px solid var(--border); border-radius:10px; background:var(--card); max-height:220px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,0.10); z-index:999;"></ul>
            </div>
            <input type="text" id="add-category" placeholder="카테고리 (자동입력)" />
            <input type="text" id="add-address" class="full" placeholder="주소 (가게 선택시 자동입력)" readonly style="background:#f3f4f6" />
            <input type="number" id="add-lat" placeholder="위도 (자동입력)" step="any" style="background:#f3f4f6" readonly />
            <input type="number" id="add-lng" placeholder="경도 (자동입력)" step="any" style="background:#f3f4f6" readonly />
          </div>
          <h3 style="margin-top:1rem; margin-bottom:0.65rem;">할인 정보 추가</h3>
          <div class="form-grid">
            <select id="add-drink">
              <option value="소주">소주</option>
              <option value="맥주">맥주</option>
              <option value="막걸리">막걸리</option>
            </select>
            <input type="number" id="add-sale-price" placeholder="할인가격 (원) *" />
            <input type="number" id="add-orig-price" placeholder="원래가격 (원)" />
            <input type="text" id="add-happy" placeholder="해피아워 (예: 17:00~19:00)" />
          </div>
          <button class="add-btn" id="add-store-btn" onclick="addStore()">가게 추가하기</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://cmuwjuuvatuhmqohfngl.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtdXdqdXV2YXR1aG1xb2hmbmdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjgzNzMsImV4cCI6MjA5NTg0NDM3M30.JcnU-wXdE_v1SFs8Ucs0Tf_tSmTQ_x1XGpesw0Kdml0'
  const ADMIN_PW = '8565'

  const KAKAO_REST_KEY = '15572497d330a96e5460225ce3ee3963'
  const KIMPO_CENTER = { x: 126.7, y: 37.62, radius: 5000 }
  let adminSearchTimer = null
  let adminPlaceCache = []
  let adminGeocode = null

  document.getElementById('add-name')?.addEventListener('input', (e) => {
    const q = e.target.value.trim()
    adminGeocode = null
    clearTimeout(adminSearchTimer)
    if (q.length < 2) { hideAdminSuggest(); return }
    adminSearchTimer = setTimeout(async () => {
      try {
        const url = new URL('https://dapi.kakao.com/v2/local/search/keyword.json')
        url.searchParams.set('query', q)
        url.searchParams.set('x', String(KIMPO_CENTER.x))
        url.searchParams.set('y', String(KIMPO_CENTER.y))
        url.searchParams.set('radius', String(KIMPO_CENTER.radius))
        const res = await fetch(url.toString(), { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } })
        const data = await res.json()
        adminPlaceCache = data.documents || []
        renderAdminSuggest(adminPlaceCache)
      } catch { hideAdminSuggest() }
    }, 300)
  })

  function renderAdminSuggest(places) {
    const ul = document.getElementById('admin-suggest')
    if (!places.length) { ul.style.display = 'none'; return }
    ul.innerHTML = places.map((p, i) => `
      <li onclick="selectAdminPlace(${i})" style="padding:0.65rem 0.85rem; border-bottom:1px solid var(--border); cursor:pointer; font-size:0.85rem;">
        <strong style="display:block; font-weight:700">${p.place_name || ''}</strong>
        <span style="font-size:0.75rem; color:var(--muted)">${p.road_address_name || p.address_name || ''}</span>
      </li>
    `).join('')
    ul.style.display = 'block'
  }

  function selectAdminPlace(i) {
    const p = adminPlaceCache[i]
    if (!p) return
    document.getElementById('add-name').value = p.place_name || ''
    document.getElementById('add-address').value = p.road_address_name || p.address_name || ''
    document.getElementById('add-category').value = (p.category_name || '').split(' > ').pop() || ''
    document.getElementById('add-lat').value = p.y || ''
    document.getElementById('add-lng').value = p.x || ''
    adminGeocode = { lat: parseFloat(p.y), lng: parseFloat(p.x) }
    hideAdminSuggest()
  }

  function hideAdminSuggest() {
    const ul = document.getElementById('admin-suggest')
    if (ul) ul.style.display = 'none'
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#add-name') && !e.target.closest('#admin-suggest')) hideAdminSuggest()
  })


  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  function doLogin() {
    const pw = document.getElementById('pw-input').value
    if (pw === ADMIN_PW) {
      document.getElementById('login-wrap').style.display = 'none'
      document.getElementById('admin-wrap').style.display = 'block'
      loadAll()
    } else {
      document.getElementById('login-error').style.display = 'block'
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin()
  })

  function doLogout() {
    document.getElementById('login-wrap').style.display = 'flex'
    document.getElementById('admin-wrap').style.display = 'none'
    document.getElementById('pw-input').value = ''
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
    btn.classList.add('active')
    document.getElementById(`tab-${name}`).classList.add('active')
  }

  function drinkBadge(type) {
    const map = { '소주': 'soju', '맥주': 'beer', '막걸리': 'makgeolli' }
    const cls = map[type] || 'other'
    return `<span class="badge badge-${cls}">${type || '-'}</span>`
  }

  function formatPrice(p) {
    if (!p) return '-'
    return Number(p).toLocaleString('ko-KR') + '원'
  }

  let storesData = []
  let dealsData = []
  let reportsData = []

  async function loadAll() {
    await Promise.all([loadStores(), loadDeals(), loadReports()])
    updateStats()
  }

  function updateStats() {
    document.getElementById('stat-stores').textContent = storesData.length
    document.getElementById('stat-deals').textContent = dealsData.length
    const pending = reportsData.filter(r => !r['승인여부']).length
    document.getElementById('stat-reports').textContent = pending
  }

  let pendingData = []
  async function loadStores() {
    const { data, error } = await db.from('stores').select('*').order('created_at', { ascending: false })
    if (error) { document.getElementById('stores-table').innerHTML = `<p class="empty">오류: ${error.message}</p>`; return }
    const all = data || []
    storesData = all.filter(s => s.is_approved !== false)
    pendingData = all.filter(s => s.is_approved === false)
    document.getElementById('stores-count').textContent = `${storesData.length}개`
    const pc = document.getElementById('pending-count'); if (pc) pc.textContent = `${pendingData.length}개`
    renderStores()
    renderPending()
  }

  function renderPending() {
    const el = document.getElementById('pending-table'); if (!el) return
    if (!pendingData.length) { el.innerHTML = '<p class="empty">승인 대기 중인 가게가 없습니다.</p>'; return }
    el.innerHTML = `
      <table class="data-table">
        <thead><tr><th>가게이름</th><th>주소</th><th>좌표</th><th>처리</th></tr></thead>
        <tbody>
          ${pendingData.map(s => `
            <tr>
              <td><strong>${s.name || '-'}</strong></td>
              <td>${s.address || '-'}</td>
              <td style="font-size:0.75rem; color:var(--muted)">${s.lat ? `${Number(s.lat).toFixed(4)}, ${Number(s.lng).toFixed(4)}` : '없음'}</td>
              <td style="white-space:nowrap">
                <button class="confirm-btn" onclick="approveStore('${s.id}')">✓ 승인</button>
                <button class="del-btn" onclick="deleteStore('${s.id}', '${(s.name||'').replace(/'/g,"\\'")}')">거절</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `
  }

  async function approveStore(id) {
    const { error } = await db.from('stores').update({ is_approved: true }).eq('id', id)
    if (error) { alert('승인 실패: ' + error.message); return }
    await loadAll()
  }

  function renderStores() {
    const el = document.getElementById('stores-table')
    if (!storesData.length) { el.innerHTML = '<p class="empty">등록된 가게가 없습니다.</p>'; return }
    el.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>가게이름</th>
            <th>주소</th>
            <th>카테고리</th>
            <th>좌표</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody>
          ${storesData.map(s => `
            <tr>
              <td><strong>${s.name || '-'}</strong></td>
              <td>${s.address || '-'}</td>
              <td>${s.category || '-'}</td>
              <td style="font-size:0.75rem; color:var(--muted)">${s.lat ? `${Number(s.lat).toFixed(4)}, ${Number(s.lng).toFixed(4)}` : '없음'}</td>
              <td><button class="del-btn" onclick="deleteStore('${s.id}', '${(s.name||'').replace(/'/g,"\\'")}')">삭제</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `
  }

  async function deleteStore(id, name) {
    if (!confirm(`"${name}" 가게를 삭제할까요?\n관련 할인 정보도 함께 삭제됩니다.`)) return
    await db.from('deals').delete().eq('store_id', id)
    const { error } = await db.from('stores').delete().eq('id', id)
    if (error) { alert('삭제 실패: ' + error.message); return }
    await loadAll()
  }

  async function loadDeals() {
    const { data, error } = await db.from('deals').select('*, stores(name)').order('created_at', { ascending: false })
    if (error) { document.getElementById('deals-table').innerHTML = `<p class="empty">오류: ${error.message}</p>`; return }
    dealsData = data || []
    document.getElementById('deals-count').textContent = `${dealsData.length}개`
    renderDeals()
  }

  function renderDeals() {
    const el = document.getElementById('deals-table')
    if (!dealsData.length) { el.innerHTML = '<p class="empty">등록된 할인 정보가 없습니다.</p>'; return }
    el.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>가게</th>
            <th>술종류</th>
            <th>할인가</th>
            <th>원가</th>
            <th>해피아워</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody>
          ${dealsData.map(d => `
            <tr>
              <td><strong>${d.stores?.name || '-'}</strong></td>
              <td>${drinkBadge(d.drink_type || d['술종류'])}</td>
              <td style="color:var(--danger); font-weight:700">${formatPrice(d.sale_price || d['할인가격'])}</td>
              <td style="color:var(--muted)">${formatPrice(d.original_price)}</td>
              <td style="font-size:0.78rem">${d['해피아워시간'] || d.happy_hours || '-'}</td>
              <td><button class="del-btn" onclick="deleteDeal('${d.id}')">삭제</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `
  }

  async function deleteDeal(id) {
    if (!confirm('이 할인 정보를 삭제할까요?')) return
    const { error } = await db.from('deals').delete().eq('id', id)
    if (error) { alert('삭제 실패: ' + error.message); return }
    await loadAll()
  }

  async function loadReports() {
    const { data, error } = await db.from('reports').select('*').order('created_at', { ascending: false })
    if (error) { document.getElementById('reports-table').innerHTML = `<p class="empty">오류: ${error.message}</p>`; return }
    reportsData = data || []
    document.getElementById('reports-count').textContent = `${reportsData.length}건`
    renderReports()
  }

  function renderReports() {
    const el = document.getElementById('reports-table')
    if (!reportsData.length) { el.innerHTML = '<p class="empty">제보가 없습니다.</p>'; return }
    el.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>가게이름</th>
            <th>주소</th>
            <th>술종류</th>
            <th>할인가</th>
            <th>메모</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody>
          ${reportsData.map(r => `
            <tr>
              <td><strong>${r['가게이름'] || '-'}</strong></td>
              <td style="font-size:0.78rem">${r['주소'] || '-'}</td>
              <td>${drinkBadge(r['술종류'])}</td>
              <td style="color:var(--danger); font-weight:700">${formatPrice(r['할인가격'])}</td>
              <td style="font-size:0.78rem; color:var(--muted)">${r['메모'] || '-'}</td>
              <td><span class="badge ${r['승인여부'] ? 'badge-confirmed' : 'badge-pending'}">${r['승인여부'] ? '승인됨' : '대기중'}</span></td>
              <td>
                <button class="del-btn" onclick="deleteReport('${r.id}')">삭제</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `
  }

  async function deleteReport(id) {
    if (!confirm('이 제보를 삭제할까요?')) return
    const { error } = await db.from('reports').delete().eq('id', id)
    if (error) { alert('삭제 실패: ' + error.message); return }
    await loadAll()
  }

  async function addStore() {
    const name = document.getElementById('add-name').value.trim()
    const address = document.getElementById('add-address').value.trim()
    const category = document.getElementById('add-category').value.trim()
    const lat = adminGeocode?.lat || parseFloat(document.getElementById('add-lat').value)
    const lng = adminGeocode?.lng || parseFloat(document.getElementById('add-lng').value)
    const drinkType = document.getElementById('add-drink').value
    const salePrice = parseInt(document.getElementById('add-sale-price').value)
    const origPrice = parseInt(document.getElementById('add-orig-price').value) || null
    const happy = document.getElementById('add-happy').value.trim()

    if (!name || !address) { alert('가게이름과 주소는 필수입니다.'); return }
    if (!salePrice) { alert('할인가격을 입력해주세요.'); return }

    const btn = document.getElementById('add-store-btn')
    btn.disabled = true
    btn.textContent = '저장 중...'

    try {
      const storeRow = { name, address, category: category || '기타' }
      if (!isNaN(lat)) storeRow.lat = lat
      if (!isNaN(lng)) storeRow.lng = lng

      const { data: newStore, error: storeErr } = await db.from('stores').insert(storeRow).select('id').single()
      if (storeErr) throw storeErr

      const dealRow = { store_id: newStore.id, drink_type: drinkType, sale_price: salePrice }
      if (origPrice) dealRow.original_price = origPrice
      if (happy) dealRow['해피아워시간'] = happy

      const { error: dealErr } = await db.from('deals').insert(dealRow)
      if (dealErr) throw dealErr

      alert('가게가 추가됐어요! 🎉')
      document.getElementById('add-name').value = ''
      document.getElementById('add-address').value = ''
      document.getElementById('add-category').value = ''
      document.getElementById('add-lat').value = ''
      document.getElementById('add-lng').value = ''
      adminGeocode = null
      document.getElementById('add-sale-price').value = ''
      document.getElementById('add-orig-price').value = ''
      document.getElementById('add-happy').value = ''

      await loadAll()
    } catch (err) {
      alert('추가 실패: ' + err.message)
    }

    btn.disabled = false
    btn.textContent = '가게 추가하기'
  }
</script>
</body>
</html>
