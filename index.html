<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>술싸</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1D9E75; --primary-dark: #178a66; --primary-soft: #e8f7f1; --bg: #f5f7f6; --card: #fff; --text: #1a1f1c; --muted: #6b7280; --border: #e5ebe8; --danger: #dc2626; --tab-h: 64px; --safe-b: env(safe-area-inset-bottom, 0px); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100dvh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 0 40px rgba(0,0,0,0.06); }
    .topbar { position: relative; background: linear-gradient(165deg, #1a1410 0%, #2a1f17 55%, #1a1410 100%); color: #f5ecd8; padding: 1.5rem 1.3rem 1.35rem; flex-shrink: 0; overflow: hidden; border-bottom: 1px solid rgba(198,160,90,0.25); }
    .topbar::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 75% 20%, rgba(198,160,90,0.16) 0%, transparent 55%); pointer-events: none; }
    .topbar::after { content: ''; position: absolute; left: 1.3rem; right: 1.3rem; bottom: 0.7rem; height: 1px; background: linear-gradient(90deg, transparent, rgba(198,160,90,0.5), transparent); }
    .topbar .brand-row { position: relative; z-index: 1; display: flex; align-items: baseline; gap: 0.5rem; }
    .topbar h1 { font-family: 'Marcellus', 'Noto Serif KR', serif; font-size: 1.85rem; font-weight: 400; letter-spacing: 0.02em; line-height: 1; background: linear-gradient(180deg, #f0d99a 0%, #c6a05a 60%, #a87d3c 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .est { font-family: 'Marcellus', serif; font-size: 0.62rem; letter-spacing: 0.35em; color: rgba(198,160,90,0.7); text-transform: uppercase; }
    .topbar p { position: relative; z-index: 1; font-family: 'Noto Serif KR', serif; font-size: 0.72rem; opacity: 0.78; margin-top: 0.5rem; letter-spacing: 0.32em; font-weight: 500; text-transform: uppercase; color: #d8c9a8; }
    main { flex: 1; overflow-y: auto; padding: 1rem 1rem calc(var(--tab-h) + var(--safe-b) + 1rem); }
    .panel { display: none; } .panel.active { display: block; }
    .filters { display: flex; gap: 0.45rem; overflow-x: auto; padding-bottom: 0.25rem; margin-bottom: 1rem; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.82rem; font-weight: 600; padding: 0.45rem 0.85rem; border-radius: 999px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .card-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .store-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.05rem; }
    .store-card.clickable { cursor: pointer; transition: box-shadow 0.15s; }
    .store-card.clickable:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .store-card.nearby-card { cursor: pointer; transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    .store-card.nearby-card.active { border: 2px solid var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .store-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.35rem; }
    .store-card .distance { font-size: 0.82rem; font-weight: 700; color: var(--primary); margin-bottom: 0.3rem; }
    .store-card .addr { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.65rem; }
    .store-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.65rem; }
    .share-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 0.3rem 0.7rem; font-size: 0.78rem; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
    .share-btn:hover { background: var(--bg); }
    .happy-now { display: inline-flex; align-items: center; gap: 0.3rem; background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 8px; padding: 0.3rem 0.65rem; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .happy-dot { width: 6px; height: 6px; background: #f59e0b; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .happy-end { display: inline-flex; align-items: center; gap: 0.3rem; background: #f3f4f6; color: var(--muted); border-radius: 8px; padding: 0.3rem 0.65rem; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 1.5rem 1.25rem calc(1.5rem + var(--safe-b)); max-height: 85vh; overflow-y: auto; }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.35rem; }
    .modal-addr { font-size: 0.88rem; color: var(--muted); margin-bottom: 1rem; }
    .modal-section-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); margin: 1rem 0 0.5rem; }
    .modal-deal-row { display: flex; justify-content: space-between; align-items: center; padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
    .modal-deal-row:last-child { border-bottom: none; }
    .modal-deal-type { font-weight: 600; font-size: 0.95rem; }
    .modal-deal-price { font-size: 1rem; font-weight: 700; color: var(--danger); }
    .modal-close { width: 100%; margin-top: 1.25rem; padding: 0.85rem; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .modal-share-btn { width: 100%; margin-top: 0.65rem; padding: 0.85rem; background: #FEE500; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; color: #3C1E1E; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .search-wrap { position: relative; margin-bottom: 0.85rem; }
    .search-input { width: 100%; padding: 0.65rem 1rem 0.65rem 2.5rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.9rem; font-family: inherit; background: var(--card); }
    .search-input:focus { outline: 2px solid var(--primary-soft); border-color: var(--primary); }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    .nearby-map { width: 100%; height: 260px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem; background: #e5ebe8; }
    .nearby-section-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.65rem; color: var(--text); }
    .badges { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .badge { font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 6px; }
    .badge-cat { background: var(--primary-soft); color: var(--primary-dark); }
    .badge-deal { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-happy { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .status-box { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.9rem; }
    .status-box.error { color: var(--danger); background: #fef2f2; border-radius: 12px; border: 1px solid #fecaca; }
    .spinner { width: 32px; height: 32px; margin: 0 auto 0.75rem; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .form-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .field { margin-bottom: 0.85rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text); }
    .field label .opt { font-weight: 400; color: var(--muted); }
    .field input, .field select, .field textarea { width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--border); border-radius: 10px; font-size: 0.9rem; font-family: inherit; background: var(--card); }
    .field textarea { min-height: 80px; resize: vertical; }
    .field input:focus, .field textarea:focus { outline: 2px solid var(--primary-soft); border-color: var(--primary); }
    .btn-submit { width: 100%; margin-top: 0.5rem; padding: 0.85rem; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .toast-success { display: none; text-align: center; padding: 2rem 1rem; background: var(--primary-soft); border-radius: 14px; color: var(--primary-dark); font-weight: 600; font-size: 1rem; }
    .toast-success.show { display: block; }
    .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: calc(var(--tab-h) + var(--safe-b)); padding-bottom: var(--safe-b); background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.2rem; border: none; background: none; color: var(--muted); font-size: 0.68rem; font-weight: 600; cursor: pointer; padding: 0.4rem; }
    .tab-btn .ico { font-size: 1.25rem; line-height: 1; }
    .tab-btn.active { color: var(--primary); }
    .drink-rows { display: flex; flex-direction: column; gap: 0.55rem; }
    .drink-row { display: flex; align-items: center; gap: 0.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 0.65rem; }
    .drink-row:has(input[type="checkbox"]:checked) { border-color: var(--primary); background: var(--primary-soft); }
    .drink-check { display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; font-weight: 600; min-width: 4.5rem; cursor: pointer; flex-shrink: 0; }
    .drink-check input { width: 1rem; height: 1rem; accent-color: var(--primary); cursor: pointer; }
    .price-input-wrap { flex: 1; min-width: 0; display: flex; align-items: stretch; border: 1px solid var(--border); border-radius: 8px; background: #fff; overflow: hidden; }
    .price-input-wrap:focus-within { border-color: var(--primary); outline: 2px solid var(--primary-soft); }
    .price-input-wrap:has(.drink-price:disabled) { background: #f3f4f6; }
    .drink-price { flex: 1; min-width: 0; padding: 0.5rem 0.65rem; border: none; font-size: 0.88rem; font-family: inherit; background: transparent; }
    .drink-price:disabled { color: var(--muted); cursor: not-allowed; }
    .drink-price::placeholder { color: #9ca3af; }
    .price-unit { display: flex; align-items: center; padding: 0 0.65rem; font-size: 0.88rem; font-weight: 600; color: var(--muted); background: #f9fafb; border-left: 1px solid var(--border); flex-shrink: 0; }
    .price-input-wrap:has(.drink-price:disabled) .price-unit { background: #eef0f2; }
    .place-search-field { position: relative; }
    .place-suggest { list-style: none; margin-top: 0.35rem; border: 1px solid var(--border); border-radius: 10px; background: var(--card); max-height: 240px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .place-suggest-item { padding: 0.7rem 0.8rem; border-bottom: 1px solid var(--border); cursor: pointer; }
    .place-suggest-item:last-child { border-bottom: none; }
    .place-suggest-item:hover { background: var(--primary-soft); }
    .place-suggest-item .place-name { display: block; font-weight: 700; font-size: 0.9rem; }
    .place-suggest-item .place-addr { display: block; font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .place-suggest-item .place-cat { display: block; font-size: 0.72rem; color: var(--primary-dark); margin-top: 0.2rem; }
    .place-suggest-empty { padding: 0.9rem; text-align: center; color: var(--muted); font-size: 0.85rem; }
    #r-addr[readonly] { background: #f3f4f6; color: var(--text); }
    .geo-status { font-size: 0.82rem; margin-top: 0.4rem; font-weight: 600; }
    .geo-status.ok { color: var(--primary-dark); }
    .geo-status.fail { color: var(--danger); }
    .manual-toggle { margin-top: 0.55rem; background: none; border: none; color: var(--primary-dark); font-size: 0.8rem; font-weight: 600; cursor: pointer; padding: 0.2rem 0; text-decoration: underline; }
    .manual-toggle:hover { color: var(--primary); }
    .manual-note { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; line-height: 1.4; }
    .manual-active #r-addr { background: var(--card) !important; }
    .toast { position: fixed; bottom: calc(var(--tab-h) + var(--safe-b) + 1rem); left: 50%; transform: translateX(-50%); background: #1a1f1c; color: #fff; padding: 0.65rem 1.25rem; border-radius: 999px; font-size: 0.85rem; font-weight: 600; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .kakao-overlay { background: #fff; border-radius: 10px; padding: 7px 11px; box-shadow: 0 2px 12px rgba(0,0,0,0.18); border: 1.5px solid var(--primary); font-size: 12px; min-width: 110px; cursor: pointer; position: relative; }
    .kakao-overlay::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: var(--primary); border-bottom: none; }
    .kakao-overlay .ov-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .kakao-overlay .ov-deal { color: #c2410c; font-weight: 600; }
    .my-location-marker { width: 18px; height: 18px; background: #2563eb; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 8px rgba(37,99,235,0.4); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar"><div class="brand-row"><h1>술싸</h1><span class="est">SULSSA</span></div><p>전국 술 할인 정보</p></header>
    <main>
      <section id="panel-home" class="panel active">
        <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" class="search-input" id="search-input" placeholder="가게 이름 검색..." /></div>
        <div class="filters" id="filters">
          <button type="button" class="filter-btn active" data-filter="전체">전체</button>
          <button type="button" class="filter-btn" data-filter="소주">🍶 소주</button>
          <button type="button" class="filter-btn" data-filter="맥주">🍺 맥주</button>
          <button type="button" class="filter-btn" data-filter="막걸리">🌾 막걸리</button>
          <button type="button" class="filter-btn" data-filter="해피아워">⏰ 해피아워</button>
        </div>
        <div id="home-content"><div class="status-box"><div class="spinner"></div><p>가게 정보를 불러오는 중…</p></div></div>
      </section>
      <section id="panel-report" class="panel">
        <p class="form-title">할인 정보 제보</p>
        <div id="report-success" class="toast-success">제보해주셔서 감사합니다! 🎉</div>
        <form id="report-form">
          <div class="field place-search-field"><label for="r-name">가게이름</label><input id="r-name" name="가게이름" type="text" required placeholder="가게 이름을 검색하세요" autocomplete="off" /><ul id="place-suggest" class="place-suggest" hidden></ul></div>
          <div class="field"><label for="r-addr">주소</label><input id="r-addr" name="주소" type="text" required readonly placeholder="검색 결과에서 가게를 선택하세요" /><p id="geo-status" class="geo-status" hidden></p>
            <button type="button" id="manual-toggle" class="manual-toggle">🔍 검색에 안 나오나요? 직접 입력하기</button>
          </div>
          <div class="field"><label>술종류 및 할인가격</label>
            <div class="drink-rows" id="drink-rows">
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="소주" /><span>🍶 소주</span></label><div class="price-input-wrap"><input type="text" class="drink-price" data-drink="소주" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div></div>
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="맥주" /><span>🍺 맥주</span></label><div class="price-input-wrap"><input type="text" class="drink-price" data-drink="맥주" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div></div>
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="막걸리" /><span>🌾 막걸리</span></label><div class="price-input-wrap"><input type="text" class="drink-price" data-drink="막걸리" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div></div>
            </div>
          </div>
          <div class="field"><label for="r-happy">해피아워 시간 <span class="opt">(선택)</span></label><input id="r-happy" name="해피아워시간" type="text" placeholder="예: 17:00~19:00" /></div>
          <div class="field"><label for="r-memo">메모 <span class="opt">(선택)</span></label><textarea id="r-memo" name="메모" placeholder="추가 정보를 적어주세요"></textarea></div>
          <button type="submit" class="btn-submit" id="btn-report">제보하기</button>
        </form>
      </section>
      <section id="panel-nearby" class="panel"><div id="nearby-content"><div class="status-box"><p>내 주변 탭을 누르면 가까운 가게를 보여드려요.</p></div></div></section>
    </main>
    <nav class="tabbar">
      <button type="button" class="tab-btn active" data-tab="home"><span class="ico">🏠</span><span>홈</span></button>
      <button type="button" class="tab-btn" data-tab="report"><span class="ico">✏️</span><span>제보하기</span></button>
      <button type="button" class="tab-btn" data-tab="nearby"><span class="ico">📍</span><span>내 주변</span></button>
    </nav>
  </div>
  <div class="modal-overlay" id="modal-overlay"><div class="modal-box"><div class="modal-handle"></div><div id="modal-content"></div></div></div>
  <div class="toast" id="toast"></div>
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=006a0f6a0626dc06f75b66d845c5f920&autoload=false"></script>
  <script>
    const SUPABASE_URL = 'https://cmuwjuuvatuhmqohfngl.supabase.co'

    let stores = [], deals = [], currentFilter = '전체', searchQuery = ''
    let kakaoMap = null, kakaoOverlays = []

    function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2200) }
    function pick(row, ...keys) { for (const k of keys) { const v = row[k]; if (v != null && String(v).trim() !== '') return v } return null }
    function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML }
    function storeId(row) { return pick(row, 'id', 'store_id') }

    function dealHappy(d) { return pick(d, '해피아워시간', 'happy_hour') }
    function formatPrice(price) { if (price == null || price === '') return ''; if (typeof price === 'number') return price.toLocaleString('ko-KR') + '원'; const num = String(price).replace(/[^\d]/g, ''); return num ? Number(num).toLocaleString('ko-KR') + '원' : String(price) }
    function sanitizePriceInput(input) { const d = input.value.replace(/[^\d]/g, ''); if (input.value !== d) input.value = d }
    function parsePriceToInt(v) { const n = parseInt(String(v).replace(/[^\d]/g, ''), 10); return isNaN(n) ? null : n }
    function getDealsForStore(id) { return deals.filter(d => String(dealStoreId(d)) === String(id)) }
    function isHappyHourDeal(d) { const t = dealHappy(d); return t != null && String(t).trim() !== '' }
    function matchFilter(d, f) { if (f === '전체') return true; if (f === '해피아워') return isHappyHourDeal(d); return dealType(d) === f }
    function filteredDealsForStore(store, f) { return getDealsForStore(storeId(store)).filter(d => matchFilter(d, f)) }
    function storeVisible(store, f) { if (f === '전체') return true; return filteredDealsForStore(store, f).length > 0 }
    function parseHappyHour(str) { if (!str) return null; const m = str.match(/(\d{1,2}):(\d{2})[~\-](\d{1,2}):(\d{2})/); if (!m) return null; return { startH: +m[1], startM: +m[2], endH: +m[3], endM: +m[4] } }
    function isHappyHourNow(d) { const h = dealHappy(d); if (!h) return false; const p = parseHappyHour(h); if (!p) return false; const now = new Date(); const nm = now.getHours() * 60 + now.getMinutes(); return nm >= p.startH * 60 + p.startM && nm <= p.endH * 60 + p.endM }
    function getHappyHourStatus(sd) { const hd = sd.filter(isHappyHourDeal); if (!hd.length) return null; if (hd.some(isHappyHourNow)) { const p = parseHappyHour(dealHappy(hd[0])); if (p) { const now = new Date(); const rem = p.endH * 60 + p.endM - now.getHours() * 60 - now.getMinutes(); return { active: true, remaining: rem } } return { active: true, remaining: null } } return { active: false, timeStr: dealHappy(hd[0]) } }
    function renderHappyBadge(sd) { const s = getHappyHourStatus(sd); if (!s) return ''; if (s.active) { const rem = s.remaining != null ? ` (${s.remaining}분 남음)` : ''; return `<div class="happy-now"><span class="happy-dot"></span>해피아워 진행중${rem}</div>` } return `<div class="happy-end">⏰ 해피아워 ${esc(s.timeStr)}</div>` }
    function renderDealBadge(d) { const type = dealType(d); const p = formatPrice(dealPrice(d)); const h = dealHappy(d); if (!type) return ''; const label = p ? `${type} ${p}` : type; let html = `<span class="badge badge-deal">${esc(label)}</span>`; if (h && currentFilter === '해피아워') html += `<span class="badge badge-happy">⏰ ${esc(h)}</span>`; else if (h && currentFilter === '전체' && isHappyHourDeal(d)) html += `<span class="badge badge-happy">해피 ${esc(h)}</span>`; return html }
    function renderStoreDealBadges(id) { return getDealsForStore(id).map(d => { const type = dealType(d); const p = formatPrice(dealPrice(d)); if (!type) return ''; const label = p ? `${type} ${p}` : type; let html = `<span class="badge badge-deal">${esc(label)}</span>`; if (dealHappy(d)) html += `<span class="badge badge-happy">해피 ${esc(dealHappy(d))}</span>`; return html }).filter(Boolean).join('') }
    function storeCoords(store) { const la = parseFloat(store?.lat); const lo = parseFloat(store?.lng); if (isNaN(la) || isNaN(lo)) return null; return { lat: la, lng: lo } }
    function haversineKm(lat1, lon1, lat2, lon2) { const R = 6371, toRad = d => d * Math.PI / 180; const a = Math.sin(toRad(lat2-lat1)/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(toRad(lon2-lon1)/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) }
    function formatDistance(km) { return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km` }
    function buildStoreDealSummary(id) { const lines = getDealsForStore(id).map(d => { const t = dealType(d); const p = formatPrice(dealPrice(d)); return t && p ? `${t} ${p}` : t || '' }).filter(Boolean); return lines.join(' / ') || '할인 정보 없음' }
    function shareKakao(store) { const name = pick(store, 'name') || '가게'; const addr = pick(store, 'address') || ''; const dealText = buildStoreDealSummary(storeId(store)); const text = `🍺 술싸 - 김포 술 할인 정보\n\n📍 ${name}\n${addr}\n\n💰 ${dealText}\n\n👉 https://kimpo-app.vercel.app`; if (navigator.share) { navigator.share({ title: `술싸 - ${name}`, text, url: 'https://kimpo-app.vercel.app' }).catch(() => {}) } else { navigator.clipboard.writeText(text).then(() => showToast('📋 링크가 복사됐어요!')).catch(() => showToast('🍺 kimpo-app.vercel.app')) } }
    function openModal(store) { const id = storeId(store); const name = pick(store, 'name') || '이름 없음'; const addr = pick(store, 'address') || '—'; const cat = pick(store, 'category') || ''; const sd = getDealsForStore(id); const dealRows = sd.map(d => { const type = dealType(d); const price = formatPrice(dealPrice(d)); const h = dealHappy(d); return `<div class="modal-deal-row"><span class="modal-deal-type">${esc(type||'-')}</span><div style="text-align:right"><div class="modal-deal-price">${esc(price||'-')}</div>${h ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">${isHappyHourNow(d) ? '⏰ 지금 해피아워!' : '⏰ ' + esc(h)}</div>` : ''}</div></div>` }).join(''); document.getElementById('modal-content').innerHTML = `${renderHappyBadge(sd)}<div class="modal-name">${esc(name)}</div><div class="modal-addr">📍 ${esc(addr)}</div>${cat ? `<div style="margin-bottom:0.5rem"><span class="badge badge-cat">${esc(cat)}</span></div>` : ''}<div class="modal-section-title">할인 정보</div><div>${dealRows || '<p style="color:var(--muted);font-size:0.9rem;padding:0.5rem 0">등록된 할인 정보가 없습니다.</p>'}</div><button class="modal-share-btn" onclick="shareKakao(window.currentModalStore)">💬 카카오톡으로 공유하기</button><button class="modal-close" onclick="closeModal()">닫기</button>`; window.currentModalStore = store; document.getElementById('modal-overlay').classList.add('show') }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('show') }
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal() })
    function renderHome() { const el = document.getElementById('home-content'); let visible = stores.filter(s => storeVisible(s, currentFilter)); if (searchQuery) visible = visible.filter(s => (pick(s,'name')||'').toLowerCase().includes(searchQuery) || (pick(s,'address')||'').toLowerCase().includes(searchQuery)); if (!visible.length) { el.innerHTML = '<div class="status-box"><p>표시할 가게가 없습니다.</p></div>'; return } const html = visible.map(store => { const id = storeId(store); const name = pick(store, 'name') || '이름 없음'; const addr = pick(store, 'address') || '—'; const cat = pick(store, 'category') || '기타'; const sd = currentFilter === '전체' ? getDealsForStore(id) : filteredDealsForStore(store, currentFilter); const dealBadges = sd.map(renderDealBadge).filter(Boolean).join(''); return `<article class="store-card clickable" onclick="openModal(stores.find(s=>String(s.id)==='${esc(String(id))}'))">${renderHappyBadge(getDealsForStore(id))}<h3>${esc(name)}</h3><p class="addr">${esc(addr)}</p><div class="badges"><span class="badge badge-cat">${esc(cat)}</span>${dealBadges || '<span class="badge badge-deal">할인 정보 없음</span>'}</div><div class="store-card-footer"><span style="font-size:0.78rem;color:var(--muted)">탭하면 상세보기</span><button class="share-btn" onclick="event.stopPropagation();shareKakao(stores.find(s=>String(s.id)==='${esc(String(id))}'))">💬 공유</button></div></article>` }).join(''); el.innerHTML = `<div class="card-list">${html}</div>` }
    async function loadData() { const el = document.getElementById('home-content'); const [sr, dr] = await Promise.all([db.from('stores').select('*'), db.from('deals').select('*')]); if (sr.error) { el.innerHTML = `<div class="status-box error"><p>불러오기 실패: ${esc(sr.error.message)}</p></div>`; return } stores = sr.data || []; deals = dr.error ? [] : (dr.data || []); renderHome() }
    document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value.trim().toLowerCase(); renderHome() })
    document.getElementById('filters').addEventListener('click', e => { const btn = e.target.closest('.filter-btn'); if (!btn) return; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; renderHome() })
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { const tab = btn.dataset.tab; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(`panel-${tab}`).classList.add('active'); if (tab === 'nearby') loadNearby() }) })
    document.querySelectorAll('#drink-rows input[type="checkbox"]').forEach(cb => { cb.addEventListener('change', () => { const pi = document.querySelector(`.drink-price[data-drink="${cb.dataset.drink}"]`); pi.disabled = !cb.checked; if (!cb.checked) pi.value = ''; if (cb.checked) pi.focus() }) })
    document.querySelectorAll('.drink-price').forEach(input => input.addEventListener('input', () => sanitizePriceInput(input)))
    function setGeoStatus(type, msg) { const el = document.getElementById('geo-status'); if (!el) return; el.hidden = false; el.className = `geo-status ${type}`; el.textContent = msg }
    function clearGeoStatus() { reportGeocode = null; const el = document.getElementById('geo-status'); if (!el) return; el.hidden = true; el.textContent = ''; el.className = 'geo-status' }
    function hidePlaceSuggest() { const ul = document.getElementById('place-suggest'); if (!ul) return; ul.hidden = true; ul.innerHTML = ''; placeResultsCache = [] }
    async function searchPlacesKeyword(query) { const url = new URL('https://dapi.kakao.com/v2/local/search/keyword.json'); url.searchParams.set('query', query); url.searchParams.set('x', String(KIMPO_CENTER.x)); url.searchParams.set('y', String(KIMPO_CENTER.y)); url.searchParams.set('radius', String(KIMPO_CENTER.radius)); const res = await fetch(url.toString(), { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }); const data = await res.json(); return data.documents || [] }
    function renderPlaceSuggest(places) { const ul = document.getElementById('place-suggest'); if (!ul) return; if (!places.length) { ul.innerHTML = '<li class="place-suggest-empty">검색 결과가 없어요</li>'; ul.hidden = false; return } ul.innerHTML = places.map((p, i) => `<li class="place-suggest-item" data-index="${i}"><span class="place-name">${esc(p.place_name||'')}</span><span class="place-addr">${esc(p.road_address_name||p.address_name||'')}</span><span class="place-cat">${esc(p.category_name||'')}</span></li>`).join(''); ul.hidden = false }
    function selectPlace(place) { document.getElementById('r-name').value = place.place_name || ''; document.getElementById('r-addr').value = place.road_address_name || place.address_name || ''; const lat = parseFloat(place.y); const lng = parseFloat(place.x); if (!isNaN(lat) && !isNaN(lng)) { reportGeocode = { lat, lng }; setGeoStatus('ok', '📍 위치 확인됨') } hidePlaceSuggest() }
    document.getElementById('r-name')?.addEventListener('input', e => { if (manualMode) return; const q = e.target.value.trim(); reportGeocode = null; clearGeoStatus(); clearTimeout(placeSearchTimer); document.getElementById('r-addr').value = ''; if (!q || q.length < 2) { hidePlaceSuggest(); return } const seq = ++placeSearchSeq; placeSearchTimer = setTimeout(async () => { try { const places = await searchPlacesKeyword(q); if (seq !== placeSearchSeq) return; placeResultsCache = places; renderPlaceSuggest(places) } catch { if (seq !== placeSearchSeq) return; placeResultsCache = []; renderPlaceSuggest([]) } }, 300) })
    document.getElementById('place-suggest')?.addEventListener('click', e => { const item = e.target.closest('.place-suggest-item'); if (!item) return; const i = parseInt(item.dataset.index, 10); if (placeResultsCache[i]) selectPlace(placeResultsCache[i]) })
    document.addEventListener('click', e => { if (!e.target.closest('.place-search-field')) hidePlaceSuggest() })
    async function geocodeAddress(address) { const url = new URL('https://dapi.kakao.com/v2/local/search/address.json'); url.searchParams.set('query', address); const res = await fetch(url.toString(), { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }); const data = await res.json(); if (data.documents && data.documents.length) { const d = data.documents[0]; return { lat: parseFloat(d.y), lng: parseFloat(d.x) } } return null }
    document.getElementById('manual-toggle')?.addEventListener('click', () => { manualMode = !manualMode; const nameInput = document.getElementById('r-name'); const addrInput = document.getElementById('r-addr'); const toggle = document.getElementById('manual-toggle'); const reportForm = document.getElementById('report-form'); if (manualMode) { reportForm.classList.add('manual-active'); addrInput.removeAttribute('readonly'); addrInput.placeholder = '예: 경기 김포시 풍무로 123'; nameInput.placeholder = '가게 이름을 입력하세요'; toggle.textContent = '↩ 검색으로 돌아가기'; reportGeocode = null; hidePlaceSuggest(); setGeoStatus('ok', '✍️ 직접 입력 모드 - 가게이름과 주소를 적어주세요') } else { reportForm.classList.remove('manual-active'); addrInput.setAttribute('readonly', ''); addrInput.value = ''; nameInput.value = ''; addrInput.placeholder = '검색 결과에서 가게를 선택하세요'; nameInput.placeholder = '가게 이름을 검색하세요'; toggle.textContent = '🔍 검색에 안 나오나요? 직접 입력하기'; reportGeocode = null; clearGeoStatus() } })
    function collectReportData(form) { const store = { name: form['가게이름'].value.trim(), address: form['주소'].value.trim(), lat: reportGeocode.lat, lng: reportGeocode.lng }; const happy = form['해피아워시간'].value.trim(); const dealList = []; for (const type of DRINK_TYPES) { const cb = document.querySelector(`#drink-rows input[type="checkbox"][data-drink="${type}"]`); const pi = document.querySelector(`.drink-price[data-drink="${type}"]`); if (!cb?.checked) continue; const p = parsePriceToInt(pi.value); if (!p || p <= 0) return { error: `${type} 할인가격을 입력해주세요.` }; const deal = { 술종류: type, sale_price: p }; if (happy) deal.해피아워시간 = happy; dealList.push(deal) } if (!dealList.length) return { error: '술종류를 하나 이상 선택해주세요.' }; return { store, deals: dealList, happy } }
    async function saveReportToStoresAndDeals(data) { const { data: ns, error: se } = await db.from('stores').insert(data.store).select('id').single(); if (se) throw se; const rows = data.deals.map(d => ({ store_id: ns.id, drink_type: d.술종류, sale_price: d.sale_price, ...(d.해피아워시간 ? { 해피아워시간: d.해피아워시간 } : {}) })); const { error: de } = await db.from('deals').insert(rows); if (de) throw de }
    function resetDrinkRows() { document.querySelectorAll('#drink-rows input[type="checkbox"]').forEach(cb => cb.checked = false); document.querySelectorAll('.drink-price').forEach(input => { input.value = ''; input.disabled = true }) }
    document.getElementById('report-form').addEventListener('submit', async e => { e.preventDefault(); const btn = document.getElementById('btn-report'); const form = e.target; const success = document.getElementById('report-success'); const nameVal = form['가게이름'].value.trim(); const addrVal = form['주소'].value.trim(); if (manualMode) { if (!nameVal) { alert('가게 이름을 입력해주세요.'); return } if (!addrVal) { alert('주소를 입력해주세요.'); return } btn.disabled = true; setGeoStatus('ok', '📍 주소로 위치 찾는 중...'); const geo = await geocodeAddress(addrVal); if (geo) { reportGeocode = geo } else { reportGeocode = { lat: KIMPO_CENTER.y, lng: KIMPO_CENTER.x }; } btn.disabled = false } else if (!reportGeocode) { alert('가게를 검색해서 선택하거나, 직접 입력하기를 눌러주세요.'); return } const collected = collectReportData(form); if (collected.error) { alert(collected.error); return } btn.disabled = true; try { await saveReportToStoresAndDeals(collected); await loadData() } catch (err) { alert('저장 실패: ' + (err.message || String(err))); btn.disabled = false; return } btn.disabled = false; form.reset(); resetDrinkRows(); clearGeoStatus(); hidePlaceSuggest(); manualMode = false; form.classList.remove('manual-active'); document.getElementById('r-addr').setAttribute('readonly', ''); document.getElementById('manual-toggle').textContent = '🔍 검색에 안 나오나요? 직접 입력하기'; form.style.display = 'none'; success.classList.add('show'); setTimeout(() => { success.classList.remove('show'); form.style.display = 'block' }, 3000) })
    function setNearbyContent(html) { document.getElementById('nearby-content').innerHTML = html }
    function initKakaoMap(userLat, userLng, ranked) { kakao.maps.load(() => { const container = document.getElementById('nearby-map'); if (!container) return; kakaoOverlays.forEach(o => o.setMap(null)); kakaoOverlays = []; kakaoMap = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(userLat, userLng), level: 5 }); const myEl = document.createElement('div'); myEl.className = 'my-location-marker'; const myOverlay = new kakao.maps.CustomOverlay({ map: kakaoMap, position: new kakao.maps.LatLng(userLat, userLng), content: myEl, yAnchor: 0.5 }); kakaoOverlays.push(myOverlay); ranked.forEach(({ store }) => { const coords = storeCoords(store); if (!coords) return; const id = storeId(store); const name = pick(store, 'name') || '가게'; const dealSummary = buildStoreDealSummary(id); const el = document.createElement('div'); el.className = 'kakao-overlay'; el.innerHTML = `<div class="ov-name">🍺 ${esc(name)}</div><div class="ov-deal">${esc(dealSummary)}</div>`; el.addEventListener('click', () => focusNearbyStore(String(id))); const overlay = new kakao.maps.CustomOverlay({ map: kakaoMap, position: new kakao.maps.LatLng(coords.lat, coords.lng), content: el, yAnchor: 1.3, zIndex: 3 }); overlay.storeId = String(id); kakaoOverlays.push(overlay) }); if (ranked.length > 0) { const bounds = new kakao.maps.LatLngBounds(); bounds.extend(new kakao.maps.LatLng(userLat, userLng)); ranked.forEach(({ store }) => { const c = storeCoords(store); if (c) bounds.extend(new kakao.maps.LatLng(c.lat, c.lng)) }); kakaoMap.setBounds(bounds) } }) }
    function focusNearbyStore(id) { const overlay = kakaoOverlays.find(o => o.storeId === id); if (overlay && kakaoMap) { kakaoMap.setCenter(overlay.getPosition()); kakaoMap.setLevel(3, { animate: true }) } document.querySelectorAll('.nearby-card.active').forEach(el => el.classList.remove('active')); const card = document.querySelector(`.nearby-card[data-store-id="${id}"]`); if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }) } }
    function buildNearbyCard({ store, km }) { const id = storeId(store); const name = pick(store, 'name') || '이름 없음'; const addr = pick(store, 'address') || '—'; const dealBadges = renderStoreDealBadges(id); const happyBadge = renderHappyBadge(getDealsForStore(id)); return `<article class="store-card nearby-card" data-store-id="${esc(String(id))}" role="button" tabindex="0">${happyBadge}<p class="distance">${esc(formatDistance(km))}</p><h3>${esc(name)}</h3><p class="addr">${esc(addr)}</p><div class="badges">${dealBadges || '<span class="badge badge-deal">할인 정보 없음</span>'}</div></article>` }
    function setupNearbyCardClicks() { const list = document.querySelector('#nearby-content .card-list'); if (!list) return; list.addEventListener('click', e => { const card = e.target.closest('.nearby-card'); if (!card?.dataset.storeId) return; focusNearbyStore(card.dataset.storeId) }) }
    async function renderNearby(userLat, userLng) { if (!stores.length) { const [sr, dr] = await Promise.all([db.from('stores').select('*'), db.from('deals').select('*')]); stores = sr.data || []; deals = dr.error ? [] : (dr.data || []) } const ranked = stores.map(store => { const c = storeCoords(store); if (!c) return null; return { store, km: haversineKm(userLat, userLng, c.lat, c.lng) } }).filter(Boolean).sort((a, b) => a.km - b.km); if (!ranked.length) { setNearbyContent('<div class="status-box"><p>주변 가게를 찾을 수 없습니다.</p></div>'); return } const cardsHtml = ranked.map(buildNearbyCard).join(''); setNearbyContent(`<div id="nearby-map" class="nearby-map"></div><p class="nearby-section-title">가까운 가게</p><div class="card-list">${cardsHtml}</div>`); initKakaoMap(userLat, userLng, ranked); setupNearbyCardClicks() }
    function loadNearby() { setNearbyContent('<div class="status-box"><div class="spinner"></div><p>내 위치 찾는 중...</p></div>'); if (!navigator.geolocation) { setNearbyContent('<div class="status-box error"><p>GPS를 사용할 수 없습니다.</p></div>'); return } navigator.geolocation.getCurrentPosition(pos => renderNearby(pos.coords.latitude, pos.coords.longitude), err => { if (err.code === err.PERMISSION_DENIED) setNearbyContent('<div class="status-box error"><p>위치 권한을 허용해주세요</p></div>'); else setNearbyContent('<div class="status-box error"><p>위치를 가져오지 못했습니다.</p></div>') }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }) }
    loadData()
  </script>
