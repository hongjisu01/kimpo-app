<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>술싸</title>
  
  <!-- 카카오맵 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=006a0f6a0626dc06f75b66d845c5f920&libraries=services"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --primary: #1D9E75;
      --primary-dark: #178a66;
      --primary-soft: #e8f7f1;
      --bg: #f5f7f6;
      --card: #fff;
      --text: #1a1f1c;
      --muted: #6b7280;
      --border: #e5ebe8;
      --danger: #dc2626;
      --tab-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    .topbar {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.1rem 0.85rem;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
    .topbar p { font-size: 0.78rem; opacity: 0.9; margin-top: 0.15rem; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem calc(var(--tab-h) + var(--safe-b) + 1rem);
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .filters {
      display: flex; gap: 0.45rem; overflow-x: auto; padding-bottom: 0.25rem; margin-bottom: 1rem;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0; border: 1px solid var(--border); background: var(--card); color: var(--text);
      font-size: 0.82rem; font-weight: 600; padding: 0.45rem 0.85rem; border-radius: 999px; cursor: pointer;
    }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .card-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .nearby-map {
      width: 100%; height: 250px; border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 1rem; background: #e5ebe8;
    }
    .nearby-section-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.65rem; }
    .store-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.05rem;
    }
    .store-card.nearby-card { cursor: pointer; transition: all 0.15s; }
    .store-card.nearby-card.active {
      border: 2px solid var(--primary); box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .store-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.35rem; }
    .store-card .distance { font-size: 0.82rem; font-weight: 700; color: var(--primary); margin-bottom: 0.3rem; }
    .store-card .addr { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.65rem; }
    .badges { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .badge { font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 6px; }
    .badge-cat { background: var(--primary-soft); color: var(--primary-dark); }
    .badge-deal { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-happy { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }

    .status-box { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.9rem; }
    .status-box.error { color: var(--danger); background: #fef2f2; border-radius: 12px; border: 1px solid #fecaca; }
    .spinner {
      width: 32px; height: 32px; margin: 0 auto 0.75rem;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .form-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .field { margin-bottom: 0.85rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; }
    .field label .opt { font-weight: 400; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.9rem; background: var(--card);
    }
    .btn-submit {
      width: 100%; margin-top: 0.5rem; padding: 0.85rem; background: var(--primary);
      color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
    }
    .toast-success {
      display: none; text-align: center; padding: 2rem 1rem; background: var(--primary-soft);
      border-radius: 14px; color: var(--primary-dark); font-weight: 600;
    }
    .toast-success.show { display: block; }

    .tabbar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; height: calc(var(--tab-h) + var(--safe-b));
      padding-bottom: var(--safe-b); background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.2rem; border: none; background: none; color: var(--muted); font-size: 0.68rem;
      font-weight: 600; cursor: pointer; padding: 0.4rem;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-btn .ico { font-size: 1.25rem; line-height: 1; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>술싸</h1>
      <p>술 할인 정보</p>
    </header>
    <main>
      <!-- 홈 -->
      <section id="panel-home" class="panel active">
        <div class="filters" id="filters">
          <button type="button" class="filter-btn active" data-filter="전체">전체</button>
          <button type="button" class="filter-btn" data-filter="소주">소주</button>
          <button type="button" class="filter-btn" data-filter="맥주">맥주</button>
          <button type="button" class="filter-btn" data-filter="막걸리">막걸리</button>
          <button type="button" class="filter-btn" data-filter="해피아워">해피아워</button>
        </div>
        <div id="home-content"></div>
      </section>

      <!-- 제보하기 -->
      <section id="panel-report" class="panel">
        <p class="form-title">할인 정보 제보</p>
        <div id="report-success" class="toast-success">제보해주셔서 감사합니다!</div>
        <form id="report-form">
          <div class="field place-search-field">
            <label for="r-name">가게이름</label>
            <input id="r-name" name="가게이름" type="text" required placeholder="가게 이름을 검색하세요" autocomplete="off" />
            <ul id="place-suggest" class="place-suggest" hidden></ul>
          </div>
          <div class="field">
            <label for="r-addr">주소</label>
            <input id="r-addr" name="주소" type="text" required readonly placeholder="검색 결과에서 가게를 선택하세요" />
            <p id="geo-status" class="geo-status" hidden></p>
          </div>
          <div class="field">
            <label>술종류 및 할인가격</label>
            <div class="drink-rows" id="drink-rows">
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="소주" /><span>소주</span></label>
                <div class="price-input-wrap"><input type="text" class="drink-price" data-drink="소주" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div>
              </div>
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="맥주" /><span>맥주</span></label>
                <div class="price-input-wrap"><input type="text" class="drink-price" data-drink="맥주" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div>
              </div>
              <div class="drink-row"><label class="drink-check"><input type="checkbox" data-drink="막걸리" /><span>막걸리</span></label>
                <div class="price-input-wrap"><input type="text" class="drink-price" data-drink="막걸리" inputmode="numeric" placeholder="예: 2500" disabled /><span class="price-unit">원</span></div>
              </div>
            </div>
          </div>
          <div class="field">
            <label for="r-happy">해피아워 시간 <span class="opt">(선택)</span></label>
            <input id="r-happy" name="해피아워시간" type="text" placeholder="예: 17:00~19:00" />
          </div>
          <div class="field">
            <label for="r-memo">메모 <span class="opt">(선택)</span></label>
            <textarea id="r-memo" name="메모" placeholder="추가 정보를 적어주세요"></textarea>
          </div>
          <button type="submit" class="btn-submit" id="btn-report">제보하기</button>
        </form>
      </section>

      <!-- 내 주변 -->
      <section id="panel-nearby" class="panel">
        <div id="nearby-content"></div>
      </section>
    </main>

    <nav class="tabbar">
      <button type="button" class="tab-btn active" data-tab="home"><span class="ico">🏠</span><span>홈</span></button>
      <button type="button" class="tab-btn" data-tab="report"><span class="ico">✏️</span><span>제보하기</span></button>
      <button type="button" class="tab-btn" data-tab="nearby"><span class="ico">📍</span><span>내 주변</span></button>
    </nav>
  </div>

  <script>
    const SUPABASE_URL = 'https://cmuwjuuvatuhmqohfngl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtdXdqdXV2YXR1aG1xb2hmbmdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjgzNzMsImV4cCI6MjA5NTg0NDM3M30.JcnU-wXdE_v1SFs8Ucs0Tf_tSmTQ_x1XGpesw0Kdml0';
    const KAKAO_REST_KEY = '15572497d330a96e5460225ce3ee3963';
    const KIMPO_CENTER = { x: 126.7, y: 37.62, radius: 5000 };

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let stores = [];
    let deals = [];
    let currentFilter = '전체';
    let nearbyKakaoMap = null;
    const nearbyStoreMarkers = new Map();
    let reportGeocode = null;
    let placeSearchTimer = null;
    let placeSearchSeq = 0;
    let placeResultsCache = [];
    const DRINK_TYPES = ['소주', '맥주', '막걸리'];

    function pick(row, ...keys) {
      for (const k of keys) {
        const v = row[k];
        if (v != null && String(v).trim() !== '') return v;
      }
      return null;
    }
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function storeId(row) { return pick(row, 'id', 'store_id'); }
    function dealStoreId(deal) { return pick(deal, 'store_id', '가게_id'); }
    function dealType(deal) { return pick(deal, '술종류', 'drink_type'); }
    function dealPrice(deal) { return pick(deal, 'sale_price', '할인가격'); }
    function dealHappy(deal) { return pick(deal, '해피아워시간'); }

    function formatPrice(price) {
      if (!price) return '';
      const num = parseInt(String(price).replace(/[^\d]/g, ''), 10);
      return Number.isNaN(num) ? '' : num.toLocaleString('ko-KR') + '원';
    }
    function parsePriceToInt(value) {
      const num = parseInt(String(value).replace(/[^\d]/g, ''), 10);
      return Number.isNaN(num) ? null : num;
    }
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function formatDistance(km) {
      return km < 1 ? `${Math.round(km*1000)}m` : `${km.toFixed(1)}km`;
    }

    function getDealsForStore(id) {
      return deals.filter(d => String(dealStoreId(d)) === String(id));
    }
    function isHappyHourDeal(deal) {
      return !!dealHappy(deal);
    }
    function matchFilter(deal, filter) {
      if (filter === '전체') return true;
      if (filter === '해피아워') return isHappyHourDeal(deal);
      return dealType(deal) === filter;
    }
    function storeVisible(store, filter) {
      if (filter === '전체') return true;
      return getDealsForStore(storeId(store)).some(d => matchFilter(d, filter));
    }

    function renderDealBadge(deal) {
      const type = dealType(deal);
      const price = formatPrice(dealPrice(deal));
      let html = `<span class="badge badge-deal">${esc(type)} ${price}</span>`;
      if (isHappyHourDeal(deal)) html += `<span class="badge badge-happy">⏰ ${esc(dealHappy(deal))}</span>`;
      return html;
    }

    function renderStoreDealBadges(id) {
      return getDealsForStore(id).map(renderDealBadge).join('');
    }

    function storeCoords(store) {
      const lat = parseFloat(pick(store, 'lat', 'latitude', '위도'));
      const lng = parseFloat(pick(store, 'lng', 'longitude', '경도', 'lon'));
      return (!isNaN(lat) && !isNaN(lng)) ? {lat, lng} : null;
    }

    function buildStoreDealSummary(id) {
      return getDealsForStore(id)
        .map(d => `${dealType(d)} ${formatPrice(dealPrice(d))}`)
        .filter(Boolean)
        .join(' / ') || '할인 정보 없음';
    }

    // ==================== 카카오맵 ====================
    function initNearbyMap(userLat, userLng, ranked) {
      const container = document.getElementById('nearby-map');
      if (!container) return;

      if (nearbyKakaoMap) nearbyKakaoMap.destroy();
      nearbyStoreMarkers.clear();

      nearbyKakaoMap = new kakao.maps.Map(container, {
        center: new kakao.maps.LatLng(userLat, userLng),
        level: 5
      });

      // 내 위치
      new kakao.maps.Marker({
        position: new kakao.maps.LatLng(userLat, userLng),
        map: nearbyKakaoMap,
        title: '내 위치'
      });

      ranked.forEach(({store, km}) => {
        const coords = storeCoords(store);
        if (!coords) return;

        const marker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(coords.lat, coords.lng),
          map: nearbyKakaoMap
        });

        const id = storeId(store);
        if (id) nearbyStoreMarkers.set(String(id), marker);

        const content = `
          <div style="padding:12px 15px; min-width:240px; font-size:14px;">
            <div style="font-weight:700;">${esc(pick(store, '가게이름', 'store_name'))}</div>
            <div style="color:#666; font-size:13px;">${esc(pick(store, '주소', 'address'))}</div>
            <div style="margin-top:6px; color:#1D9E75; font-weight:600;">${esc(buildStoreDealSummary(id))}</div>
            <div style="margin-top:4px; color:#888; font-size:12.5px;">${esc(formatDistance(km))}</div>
          </div>
        `;

        const infowindow = new kakao.maps.InfoWindow({ content });

        kakao.maps.event.addListener(marker, 'click', () => {
          infowindow.open(nearbyKakaoMap, marker);
          focusNearbyStore(id);
        });
      });
    }

    function focusNearbyStore(storeIdVal) {
      const id = String(storeIdVal);
      const marker = nearbyStoreMarkers.get(id);
      if (!marker || !nearbyKakaoMap) return;

      nearbyKakaoMap.panTo(marker.getPosition());

      document.querySelectorAll('.nearby-card.active').forEach(el => el.classList.remove('active'));
      const card = document.querySelector(`.nearby-card[data-store-id="${id}"]`);
      if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function buildNearbyCard({store, km}) {
      const id = storeId(store);
      return `
        <article class="store-card nearby-card" data-store-id="${esc(String(id))}">
          <p class="distance">${esc(formatDistance(km))}</p>
          <h3>${esc(pick(store, '가게이름', 'store_name') || '이름 없음')}</h3>
          <p class="addr">${esc(pick(store, '주소', 'address') || '—')}</p>
          <div class="badges">${renderStoreDealBadges(id) || '<span class="badge badge-deal">할인 정보 없음</span>'}</div>
        </article>
      `;
    }

    function setupNearbyCardClicks() {
      const list = document.querySelector('#nearby-content .card-list');
      if (!list) return;
      list.addEventListener('click', e => {
        const card = e.target.closest('.nearby-card');
        if (card?.dataset.storeId) focusNearbyStore(card.dataset.storeId);
      });
    }

    async function ensureStoreData() {
      if (stores.length && deals.length) return true;
      const [sRes, dRes] = await Promise.all([
        db.from('stores').select('*'),
        db.from('deals').select('*')
      ]);
      stores = sRes.data || [];
      deals = dRes.error ? [] : (dRes.data || []);
      return true;
    }

    async function renderNearby(userLat, userLng) {
      await ensureStoreData();
      const ranked = stores
        .map(store => {
          const coords = storeCoords(store);
          if (!coords) return null;
          return { store, km: haversineKm(userLat, userLng, coords.lat, coords.lng) };
        })
        .filter(Boolean)
        .sort((a, b) => a.km - b.km);

      const cardsHtml = ranked.map(buildNearbyCard).join('');
      document.getElementById('nearby-content').innerHTML = `
        <div id="nearby-map" class="nearby-map"></div>
        <p class="nearby-section-title">가까운 가게</p>
        <div class="card-list">${cardsHtml}</div>
      `;
      initNearbyMap(userLat, userLng, ranked);
      setupNearbyCardClicks();
    }

    function loadNearby() {
      document.getElementById('nearby-content').innerHTML = `
        <div class="status-box"><div class="spinner"></div><p>내 위치 찾는 중...</p></div>
      `;
      navigator.geolocation.getCurrentPosition(
        pos => renderNearby(pos.coords.latitude, pos.coords.longitude),
        () => {
          document.getElementById('nearby-content').innerHTML = `<div class="status-box error"><p>위치를 가져올 수 없습니다.</p></div>`;
        }
      );
    }

    function renderHome() {
      const visible = stores.filter(s => storeVisible(s, currentFilter));
      const html = visible.map(store => {
        const id = storeId(store);
        return `
          <article class="store-card">
            <h3>${esc(pick(store, '가게이름', 'store_name') || '이름 없음')}</h3>
            <p class="addr">${esc(pick(store, '주소', 'address') || '—')}</p>
            <div class="badges">
              <span class="badge badge-cat">${esc(pick(store, '카테고리', 'category') || '기타')}</span>
              ${renderStoreDealBadges(id) || '<span class="badge badge-deal">할인 정보 없음</span>'}
            </div>
          </article>
        `;
      }).join('');
      document.getElementById('home-content').innerHTML = `<div class="card-list">${html}</div>`;
    }

    async function loadData() {
      await ensureStoreData();
      renderHome();
    }

    // 이벤트 리스너들
    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderHome();
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'nearby') loadNearby();
      });
    });

    // 제보하기 관련 (기존 로직 유지)
    document.querySelectorAll('#drink-rows input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => {
        const priceInput = document.querySelector(`.drink-price[data-drink="${cb.dataset.drink}"]`);
        priceInput.disabled = !cb.checked;
        if (!cb.checked) priceInput.value = '';
      });
    });

    document.querySelectorAll('.drink-price').forEach(input => {
      input.addEventListener('input', () => input.value = input.value.replace(/[^\d]/g, ''));
    });

    // ... (place search, report submit 등 기존 제보 로직은 동일하게 유지됨)

    loadData();
  </script>
</body>
</html>
