<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>술싸</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --primary: #1D9E75;
      --primary-dark: #178a66;
      --primary-soft: #e8f7f1;
      --bg: #f5f7f6;
      --card: #fff;
      --text: #1a1f1c;
      --muted: #6b7280;
      --border: #e5ebe8;
      --danger: #dc2626;
      --tab-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }

    .topbar {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.1rem 0.85rem;
      flex-shrink: 0;
    }

    .topbar h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar p {
      font-size: 0.78rem;
      opacity: 0.9;
      margin-top: 0.15rem;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem calc(var(--tab-h) + var(--safe-b) + 1rem);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* 필터 */
    .filters {
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      margin-bottom: 1rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* 카드 */
    .card-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .nearby-map {
      width: 100%;
      height: 250px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 1rem;
      background: #e5ebe8;
      z-index: 1;
    }

    .map-popup-title {
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .map-popup-addr {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      line-height: 1.35;
    }

    .map-popup-deal {
      font-size: 0.8rem;
      color: #c2410c;
      font-weight: 600;
      line-height: 1.4;
    }

    .nearby-section-title {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 0.65rem;
      color: var(--text);
    }

    .store-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.05rem;
    }

    .store-card.nearby-card {
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .store-card.nearby-card.active {
      border: 2px solid var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .store-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .store-card .distance {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.3rem;
    }

    .store-card .addr {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
    }

    .badge-cat {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .badge-deal {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
    }

    .badge-happy {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .status-box {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-box.error {
      color: var(--danger);
      background: #fef2f2;
      border-radius: 12px;
      border: 1px solid #fecaca;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 0.75rem;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 제보 폼 */
    .form-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 0.85rem; }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: var(--text);
    }

    .field label .opt {
      font-weight: 400;
      color: var(--muted);
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--card);
    }

    .field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: 2px solid var(--primary-soft);
      border-color: var(--primary);
    }

    .btn-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .toast-success {
      display: none;
      text-align: center;
      padding: 2rem 1rem;
      background: var(--primary-soft);
      border-radius: 14px;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 1rem;
    }

    .toast-success.show { display: block; }

    /* 준비중 */
    .coming-soon {
      text-align: center;
      padding: 4rem 1.5rem;
    }

    .coming-soon .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .coming-soon h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .coming-soon p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* 하단 탭바 */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--tab-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.4rem;
    }

    .tab-btn .ico { font-size: 1.25rem; line-height: 1; }

    .tab-btn.active {
      color: var(--primary);
    }

    /* 제보 술종류 행 */
    .drink-rows {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .drink-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.65rem;
    }

    .drink-row:has(input[type="checkbox"]:checked) {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .drink-check {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      min-width: 4.5rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .drink-check input {
      width: 1rem;
      height: 1rem;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .drink-price {
      flex: 1;
      min-width: 0;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      background: #fff;
    }

    .drink-price:disabled {
      background: #f3f4f6;
      color: var(--muted);
      cursor: not-allowed;
    }

    .drink-price::placeholder {
      color: #9ca3af;
    }

    .addr-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    .addr-row input {
      flex: 1;
      min-width: 0;
    }

    .btn-addr-check {
      flex-shrink: 0;
      padding: 0 0.9rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-addr-check:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .geo-status {
      font-size: 0.82rem;
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .geo-status.ok {
      color: var(--primary-dark);
    }

    .geo-status.fail {
      color: var(--danger);
    }

    .geo-status.pending {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>술싸</h1>
      <p>김포 술 할인 정보</p>
    </header>

    <main>
      <!-- 홈 -->
      <section id="panel-home" class="panel active">
        <div class="filters" id="filters">
          <button type="button" class="filter-btn active" data-filter="전체">전체</button>
          <button type="button" class="filter-btn" data-filter="소주">소주</button>
          <button type="button" class="filter-btn" data-filter="맥주">맥주</button>
          <button type="button" class="filter-btn" data-filter="막걸리">막걸리</button>
          <button type="button" class="filter-btn" data-filter="해피아워">해피아워</button>
        </div>
        <div id="home-content">
          <div class="status-box">
            <div class="spinner"></div>
            <p>가게 정보를 불러오는 중…</p>
          </div>
        </div>
      </section>

      <!-- 제보하기 -->
      <section id="panel-report" class="panel">
        <p class="form-title">할인 정보 제보</p>
        <div id="report-success" class="toast-success">제보해주셔서 감사합니다!</div>
        <form id="report-form">
          <div class="field">
            <label for="r-name">가게이름</label>
            <input id="r-name" name="가게이름" type="text" required placeholder="예: ○○포차" />
          </div>
          <div class="field">
            <label for="r-addr">주소</label>
            <div class="addr-row">
              <input id="r-addr" name="주소" type="text" required placeholder="예: 경기도 김포시 돌문로 60" />
              <button type="button" class="btn-addr-check" id="btn-addr-check">주소 확인</button>
            </div>
            <p id="geo-status" class="geo-status" hidden></p>
          </div>
          <div class="field">
            <label>술종류 및 할인가격</label>
            <div class="drink-rows" id="drink-rows">
              <div class="drink-row">
                <label class="drink-check">
                  <input type="checkbox" data-drink="소주" />
                  <span>소주</span>
                </label>
                <input type="text" class="drink-price" data-drink="소주" placeholder="예: 2,500원" disabled />
              </div>
              <div class="drink-row">
                <label class="drink-check">
                  <input type="checkbox" data-drink="맥주" />
                  <span>맥주</span>
                </label>
                <input type="text" class="drink-price" data-drink="맥주" placeholder="예: 2,900원" disabled />
              </div>
              <div class="drink-row">
                <label class="drink-check">
                  <input type="checkbox" data-drink="막걸리" />
                  <span>막걸리</span>
                </label>
                <input type="text" class="drink-price" data-drink="막걸리" placeholder="예: 3,000원" disabled />
              </div>
            </div>
          </div>
          <div class="field">
            <label for="r-happy">해피아워 시간 <span class="opt">(선택)</span></label>
            <input id="r-happy" name="해피아워시간" type="text" placeholder="예: 17:00~19:00" />
          </div>
          <div class="field">
            <label for="r-memo">메모 <span class="opt">(선택)</span></label>
            <textarea id="r-memo" name="메모" placeholder="추가 정보를 적어주세요"></textarea>
          </div>
          <button type="submit" class="btn-submit" id="btn-report">제보하기</button>
        </form>
      </section>

      <!-- 내 주변 -->
      <section id="panel-nearby" class="panel">
        <div id="nearby-content">
          <div class="status-box">
            <p>내 주변 탭을 누르면 가까운 가게를 보여드려요.</p>
          </div>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="메인 메뉴">
      <button type="button" class="tab-btn active" data-tab="home">
        <span class="ico">🏠</span>
        <span>홈</span>
      </button>
      <button type="button" class="tab-btn" data-tab="report">
        <span class="ico">✏️</span>
        <span>제보하기</span>
      </button>
      <button type="button" class="tab-btn" data-tab="nearby">
        <span class="ico">📍</span>
        <span>내 주변</span>
      </button>
    </nav>
  </div>

  <script>
    const SUPABASE_URL = 'https://cmuwjuuvatuhmqohfngl.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtdXdqdXV2YXR1aG1xb2hmbmdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjgzNzMsImV4cCI6MjA5NTg0NDM3M30.JcnU-wXdE_v1SFs8Ucs0Tf_tSmTQ_x1XGpesw0Kdml0'
    const KAKAO_REST_KEY = '15572497d330a96e5460225ce3ee3963'
    const MIN_ADDRESS_LENGTH = 10
    const MSG_ADDRESS_SHORT = '정확한 도로명 주소를 입력해주세요'
    const MSG_ADDRESS_NOT_FOUND = '주소를 찾을 수 없어요. 도로명 주소로 다시 입력해주세요'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let stores = []
    let deals = []
    let currentFilter = '전체'
    let nearbyLeafletMap = null
    const nearbyStoreMarkers = new Map()
    let reportGeocode = null
    let geocodeDebounceTimer = null

    const DRINK_TYPES = ['소주', '맥주', '막걸리']

    function pick(row, ...keys) {
      for (const k of keys) {
        const v = row[k]
        if (v != null && String(v).trim() !== '') return v
      }
      return null
    }

    function esc(s) {
      const d = document.createElement('div')
      d.textContent = s == null ? '' : String(s)
      return d.innerHTML
    }

    function storeId(row) {
      return pick(row, 'id', 'store_id')
    }

    function dealStoreId(deal) {
      return pick(deal, 'store_id', '가게_id', 'stores_id')
    }

    function dealType(deal) {
      return pick(deal, '술종류', 'drink_type', 'type', 'category')
    }

    function dealPrice(deal) {
      return pick(deal, 'sale_price', '할인가격', 'price', 'discount_price')
    }

    function dealHappy(deal) {
      return pick(deal, '해피아워시간', 'happy_hour', 'happy_hour_time')
    }

    function formatPrice(price) {
      if (price == null || price === '') return ''
      if (typeof price === 'number' && !Number.isNaN(price)) {
        return price.toLocaleString('ko-KR') + '원'
      }
      const s = String(price).trim()
      if (!s) return ''
      if (s.includes('원')) return s
      const num = s.replace(/[^\d]/g, '')
      if (num) return Number(num).toLocaleString('ko-KR') + '원'
      return s
    }

    function getDealsForStore(id) {
      return deals.filter((d) => String(dealStoreId(d)) === String(id))
    }

    function isHappyHourDeal(deal) {
      const t = dealHappy(deal)
      return t != null && String(t).trim() !== ''
    }

    function matchFilter(deal, filter) {
      if (filter === '전체') return true
      if (filter === '해피아워') return isHappyHourDeal(deal)
      return dealType(deal) === filter
    }

    function filteredDealsForStore(store, filter) {
      const id = storeId(store)
      return getDealsForStore(id).filter((d) => matchFilter(d, filter))
    }

    function storeVisible(store, filter) {
      if (filter === '전체') return true
      return filteredDealsForStore(store, filter).length > 0
    }

    function renderDealBadge(deal) {
      const type = dealType(deal)
      const priceText = formatPrice(dealPrice(deal))
      const happy = dealHappy(deal)

      if (!type) return ''
      const label = priceText ? `${type} ${priceText}` : type

      let html = `<span class="badge badge-deal">${esc(label)}</span>`
      if (happy && currentFilter === '해피아워') {
        html += `<span class="badge badge-happy">⏰ ${esc(happy)}</span>`
      } else if (happy && currentFilter === '전체' && isHappyHourDeal(deal)) {
        html += `<span class="badge badge-happy">해피 ${esc(happy)}</span>`
      }
      return html
    }

    function renderStoreDealBadges(id) {
      return getDealsForStore(id)
        .map((deal) => {
          const type = dealType(deal)
          const priceText = formatPrice(dealPrice(deal))
          if (!type) return ''
          const label = priceText ? `${type} ${priceText}` : type
          let html = `<span class="badge badge-deal">${esc(label)}</span>`
          const happy = dealHappy(deal)
          if (happy && isHappyHourDeal(deal)) {
            html += `<span class="badge badge-happy">해피 ${esc(happy)}</span>`
          }
          return html
        })
        .filter(Boolean)
        .join('')
    }

    function storeCoords(store) {
      const la = parseFloat(store?.lat ?? pick(store, 'latitude', '위도'))
      const lo = parseFloat(store?.lng ?? pick(store, 'longitude', '경도', 'lon'))
      if (Number.isNaN(la) || Number.isNaN(lo)) return null
      return { lat: la, lng: lo }
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371
      const toRad = (d) => (d * Math.PI) / 180
      const dLat = toRad(lat2 - lat1)
      const dLon = toRad(lon2 - lon1)
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))
    }

    function formatDistance(km) {
      if (km < 1) return `${Math.round(km * 1000)}m`
      return `${km.toFixed(1)}km`
    }

    function setNearbyContent(html) {
      document.getElementById('nearby-content').innerHTML = html
    }

    function buildStoreDealSummary(storeIdVal) {
      const lines = getDealsForStore(storeIdVal)
        .map((deal) => {
          const type = dealType(deal)
          const priceText = formatPrice(dealPrice(deal))
          if (!type) return ''
          return priceText ? `${type} ${priceText}` : type
        })
        .filter(Boolean)
      return lines.length ? lines.join(' / ') : '할인 정보 없음'
    }

    function buildStorePopupHtml(store) {
      const id = storeId(store)
      const name = pick(store, '가게이름', 'store_name', 'name') || '이름 없음'
      const addr = pick(store, '주소', 'address') || '—'
      const dealsText = buildStoreDealSummary(id)

      return `
        <div class="map-popup-title">${esc(name)}</div>
        <div class="map-popup-addr">${esc(addr)}</div>
        <div class="map-popup-deal">${esc(dealsText)}</div>
      `
    }

    function buildNearbyCard({ store, km }) {
      const id = storeId(store)
      const name = pick(store, '가게이름', 'store_name', 'name') || '이름 없음'
      const addr = pick(store, '주소', 'address') || '—'
      const dealBadges = renderStoreDealBadges(id)

      return `
        <article class="store-card nearby-card" data-store-id="${esc(String(id))}" role="button" tabindex="0">
          <p class="distance">${esc(formatDistance(km))}</p>
          <h3>${esc(name)}</h3>
          <p class="addr">${esc(addr)}</p>
          <div class="badges">${dealBadges || '<span class="badge badge-deal">할인 정보 없음</span>'}</div>
        </article>
      `
    }

    function focusNearbyStore(storeIdVal) {
      const id = String(storeIdVal)
      const marker = nearbyStoreMarkers.get(id)
      if (!marker || !nearbyLeafletMap) return

      const { lat, lng } = marker.getLatLng()
      nearbyLeafletMap.setView([lat, lng], 16, { animate: true })
      marker.openPopup()

      document.querySelectorAll('.nearby-card.active').forEach((el) => el.classList.remove('active'))
      const card = document.querySelector(`.nearby-card[data-store-id="${id}"]`)
      if (card) {
        card.classList.add('active')
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
      }
    }

    function setupNearbyCardClicks() {
      const list = document.querySelector('#nearby-content .card-list')
      if (!list) return

      list.addEventListener('click', (e) => {
        const card = e.target.closest('.nearby-card')
        if (!card?.dataset.storeId) return
        focusNearbyStore(card.dataset.storeId)
      })

      list.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return
        const card = e.target.closest('.nearby-card')
        if (!card?.dataset.storeId) return
        e.preventDefault()
        focusNearbyStore(card.dataset.storeId)
      })
    }

    function initNearbyMap(userLat, userLng, ranked) {
      const container = document.getElementById('nearby-map')
      if (!container || typeof L === 'undefined') return

      if (nearbyLeafletMap) {
        nearbyLeafletMap.remove()
        nearbyLeafletMap = null
      }
      nearbyStoreMarkers.clear()

      nearbyLeafletMap = L.map(container).setView([userLat, userLng], 14)

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(nearbyLeafletMap)

      const markerGroup = L.featureGroup()

      const userMarker = L.circleMarker([userLat, userLng], {
        radius: 10,
        fillColor: '#2563eb',
        color: '#ffffff',
        weight: 3,
        fillOpacity: 0.95,
      }).bindPopup('내 위치')
      markerGroup.addLayer(userMarker)

      ranked.forEach(({ store }) => {
        const coords = storeCoords(store)
        if (!coords) return

        const storeMarker = L.circleMarker([coords.lat, coords.lng], {
          radius: 8,
          fillColor: '#1D9E75',
          color: '#ffffff',
          weight: 2,
          fillOpacity: 0.95,
        }).bindPopup(buildStorePopupHtml(store), { maxWidth: 280 })

        const sid = storeId(store)
        if (sid != null) nearbyStoreMarkers.set(String(sid), storeMarker)

        markerGroup.addLayer(storeMarker)
      })

      markerGroup.addTo(nearbyLeafletMap)

      if (markerGroup.getLayers().length > 0) {
        nearbyLeafletMap.fitBounds(markerGroup.getBounds().pad(0.15), {
          maxZoom: 16,
          animate: true,
        })
      }

      setTimeout(() => nearbyLeafletMap.invalidateSize(), 200)
    }

    async function ensureStoreData() {
      if (stores.length && deals.length) return true

      const [storesRes, dealsRes] = await Promise.all([
        stores.length
          ? Promise.resolve({ data: stores, error: null })
          : db.from('stores').select('*'),
        deals.length ? Promise.resolve({ data: deals, error: null }) : db.from('deals').select('*'),
      ])

      if (storesRes.error) return { error: storesRes.error.message }
      stores = storesRes.data || []
      deals = dealsRes.error ? [] : (dealsRes.data || [])
      return true
    }

    async function renderNearby(userLat, userLng) {
      const ready = await ensureStoreData()
      if (ready.error) {
        setNearbyContent(`<div class="status-box error"><p>가게 목록을 불러오지 못했습니다.<br>${esc(ready.error)}</p></div>`)
        return
      }

      const ranked = stores
        .map((store) => {
          const coords = storeCoords(store)
          if (!coords) return null
          return {
            store,
            km: haversineKm(userLat, userLng, coords.lat, coords.lng),
          }
        })
        .filter(Boolean)
        .sort((a, b) => a.km - b.km)

      if (!ranked.length) {
        setNearbyContent(
          '<div class="status-box"><p>거리를 계산할 수 있는 가게가 없습니다.<br>가게에 위도·경도가 등록되어 있는지 확인해주세요.</p></div>'
        )
        return
      }

      const cardsHtml = ranked.map(buildNearbyCard).join('')

      setNearbyContent(`
        <div id="nearby-map" class="nearby-map" aria-label="주변 가게 지도"></div>
        <p class="nearby-section-title">가까운 가게</p>
        <div class="card-list">${cardsHtml}</div>
      `)

      initNearbyMap(userLat, userLng, ranked)
      setupNearbyCardClicks()
    }

    function loadNearby() {
      setNearbyContent(
        '<div class="status-box"><div class="spinner"></div><p>내 위치 찾는 중...</p></div>'
      )

      if (!navigator.geolocation) {
        setNearbyContent('<div class="status-box error"><p>이 기기에서는 GPS를 사용할 수 없습니다.</p></div>')
        return
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => renderNearby(pos.coords.latitude, pos.coords.longitude),
        (err) => {
          if (err.code === err.PERMISSION_DENIED) {
            setNearbyContent('<div class="status-box error"><p>위치 권한을 허용해주세요</p></div>')
            return
          }
          setNearbyContent('<div class="status-box error"><p>위치를 가져오지 못했습니다. 다시 시도해주세요.</p></div>')
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
      )
    }

    function renderHome() {
      const el = document.getElementById('home-content')
      const visible = stores.filter((s) => storeVisible(s, currentFilter))

      if (!visible.length) {
        el.innerHTML = '<div class="status-box"><p>표시할 가게가 없습니다.</p></div>'
        return
      }

      const html = visible.map((store) => {
        const id = storeId(store)
        const name = pick(store, '가게이름', 'store_name', 'name') || '이름 없음'
        const addr = pick(store, '주소', 'address') || '—'
        const cat = pick(store, '카테고리', 'category') || '기타'

        const showDeals = currentFilter === '전체'
          ? getDealsForStore(id)
          : filteredDealsForStore(store, currentFilter)

        const dealBadges = showDeals.map(renderDealBadge).filter(Boolean).join('')
        const badges = `
          <span class="badge badge-cat">${esc(cat)}</span>
          ${dealBadges || '<span class="badge badge-deal">할인 정보 없음</span>'}
        `

        return `
          <article class="store-card">
            <h3>${esc(name)}</h3>
            <p class="addr">${esc(addr)}</p>
            <div class="badges">${badges}</div>
          </article>
        `
      }).join('')

      el.innerHTML = `<div class="card-list">${html}</div>`
    }

    async function loadData() {
      const el = document.getElementById('home-content')
      const [storesRes, dealsRes] = await Promise.all([
        db.from('stores').select('*'),
        db.from('deals').select('*'),
      ])

      if (storesRes.error) {
        el.innerHTML = `<div class="status-box error"><p>가게 목록을 불러오지 못했습니다.<br>${esc(storesRes.error.message)}</p></div>`
        return
      }

      stores = storesRes.data || []
      deals = dealsRes.error ? [] : (dealsRes.data || [])
      renderHome()
    }

    document.getElementById('filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn')
      if (!btn) return
      document.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('active'))
      btn.classList.add('active')
      currentFilter = btn.dataset.filter
      renderHome()
    })

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'))
        btn.classList.add('active')
        document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'))
        document.getElementById(`panel-${tab}`).classList.add('active')
        if (tab === 'nearby') loadNearby()
      })
    })

    document.querySelectorAll('#drink-rows input[type="checkbox"]').forEach((cb) => {
      cb.addEventListener('change', () => {
        const type = cb.dataset.drink
        const priceInput = document.querySelector(`.drink-price[data-drink="${type}"]`)
        priceInput.disabled = !cb.checked
        if (!cb.checked) priceInput.value = ''
        if (cb.checked) priceInput.focus()
      })
    })

    function setGeoStatus(type, message) {
      const el = document.getElementById('geo-status')
      if (!el) return
      el.hidden = false
      el.className = `geo-status ${type}`
      el.textContent = message
    }

    function clearGeoStatus() {
      reportGeocode = null
      const el = document.getElementById('geo-status')
      if (!el) return
      el.hidden = true
      el.textContent = ''
      el.className = 'geo-status'
    }

    function hasKakaoAddressFields(doc) {
      return Boolean(doc?.road_address || doc?.address)
    }

    async function geocodeAddress(address) {
      const url = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address)}`
      const res = await fetch(url, {
        headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` },
      })

      if (!res.ok) throw new Error(`주소 검색 API 오류 (${res.status})`)

      const data = await res.json()
      const documents = data.documents

      if (!documents || documents.length === 0) {
        return { success: false }
      }

      const doc = documents[0]
      if (!hasKakaoAddressFields(doc)) {
        return { success: false }
      }

      const lat = parseFloat(doc.y)
      const lng = parseFloat(doc.x)
      if (Number.isNaN(lat) || Number.isNaN(lng)) {
        return { success: false }
      }

      return { success: true, lat, lng }
    }

    async function verifyReportAddress() {
      const addrInput = document.getElementById('r-addr')
      const btn = document.getElementById('btn-addr-check')
      const address = addrInput?.value.trim()

      if (!address) {
        reportGeocode = null
        setGeoStatus('fail', MSG_ADDRESS_SHORT)
        return null
      }

      if (address.length < MIN_ADDRESS_LENGTH) {
        reportGeocode = null
        setGeoStatus('fail', MSG_ADDRESS_SHORT)
        return null
      }

      btn.disabled = true
      setGeoStatus('pending', '주소 검색 중…')

      try {
        const result = await geocodeAddress(address)
        if (!result.success) {
          reportGeocode = null
          setGeoStatus('fail', MSG_ADDRESS_NOT_FOUND)
          return null
        }

        reportGeocode = { lat: result.lat, lng: result.lng }
        setGeoStatus('ok', '📍 위치 확인됨')
        return reportGeocode
      } catch {
        reportGeocode = null
        setGeoStatus('fail', MSG_ADDRESS_NOT_FOUND)
        return null
      } finally {
        btn.disabled = false
      }
    }

    document.getElementById('btn-addr-check')?.addEventListener('click', () => {
      clearTimeout(geocodeDebounceTimer)
      verifyReportAddress()
    })

    document.getElementById('r-addr')?.addEventListener('input', () => {
      reportGeocode = null
      clearTimeout(geocodeDebounceTimer)

      const address = document.getElementById('r-addr')?.value.trim() || ''
      if (!address) {
        clearGeoStatus()
        return
      }

      if (address.length < MIN_ADDRESS_LENGTH) {
        setGeoStatus('fail', MSG_ADDRESS_SHORT)
        return
      }

      setGeoStatus('pending', '주소 검색 중…')
      geocodeDebounceTimer = setTimeout(() => verifyReportAddress(), 700)
    })

    function collectReportRows(form) {
      const base = {
        가게이름: form['가게이름'].value.trim(),
        주소: form['주소'].value.trim(),
      }
      const happy = form['해피아워시간'].value.trim()
      const memo = form['메모'].value.trim()
      if (happy) base['해피아워시간'] = happy
      if (memo) base['메모'] = memo

      if (reportGeocode) {
        base.lat = reportGeocode.lat
        base.lng = reportGeocode.lng
      }

      const rows = []
      for (const type of DRINK_TYPES) {
        const cb = document.querySelector(`#drink-rows input[type="checkbox"][data-drink="${type}"]`)
        const priceInput = document.querySelector(`.drink-price[data-drink="${type}"]`)
        if (!cb?.checked) continue

        const priceRaw = priceInput.value.trim()
        if (!priceRaw) {
          return { error: `${type} 할인가격을 입력해주세요.` }
        }

        rows.push({
          ...base,
          술종류: type,
          할인가격: formatPrice(priceRaw),
        })
      }

      if (!rows.length) {
        return { error: '술종류를 하나 이상 선택해주세요.' }
      }

      return { rows }
    }

    function resetDrinkRows() {
      document.querySelectorAll('#drink-rows input[type="checkbox"]').forEach((cb) => {
        cb.checked = false
      })
      document.querySelectorAll('.drink-price').forEach((input) => {
        input.value = ''
        input.disabled = true
      })
    }

    document.getElementById('report-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('btn-report')
      const form = e.target
      const success = document.getElementById('report-success')

      if (!reportGeocode) {
        const coords = await verifyReportAddress()
        if (!coords) {
          alert('도로명 주소를 입력한 뒤 「주소 확인」으로 위치를 확인해주세요.')
          return
        }
      }

      const collected = collectReportRows(form)
      if (collected.error) {
        alert(collected.error)
        return
      }

      btn.disabled = true
      success.classList.remove('show')
      form.style.display = 'block'

      const { error } = await db.from('reports').insert(collected.rows)

      btn.disabled = false

      if (error) {
        alert('제보 저장에 실패했습니다: ' + error.message)
        return
      }

      form.reset()
      resetDrinkRows()
      clearGeoStatus()
      form.style.display = 'none'
      success.classList.add('show')

      setTimeout(() => {
        success.classList.remove('show')
        form.style.display = 'block'
      }, 3000)
    })

    loadData()
  </script>
</body>
</html>
